<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Facebook Clone</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f0f2f5;
        }

        .top-bar {
            background-color: #3b5998;
            color: white;
            padding: 10px;
        }

        .facebook-text {
            font-size: 40px;
            font-weight: bold;
        }

        .form-control {
            margin-bottom: 10px;
        }

        .signup-box {
            background: white;
            padding: 20px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <!-- ✅ Top Navbar -->
    <div class="top-bar">
        <div class="container d-flex justify-content-between align-items-center">

            <div class="facebook-text">facebook</div>

            <!-- Login Form -->
            <form class="d-flex align-items-center">
                <input type="text" id="loginEmail" class="form-control me-2" placeholder="Email or Username">
                <input type="password" id="loginPassword" class="form-control me-2" placeholder="Password">
                <button class="btn btn-light btn-sm">Login</button>
            </form>

        </div>
    </div>

    <!-- ✅ Main Section -->
    <div class="container mt-5">
        <div class="row">

            <!-- Left Side -->
            <div class="col-md-6">
                <h4>Facebook is useless without friends.<br>Make More Friends.</h4>

                <div class="mt-4 p-3 bg-white rounded">
                    <p><strong>Facebook helps you connect and share with the people in your life.</strong></p>
                    <img src="https://via.placeholder.com/400x200" class="img-fluid">
                </div>
            </div>

            <!-- Right Side Signup -->
            <div class="col-md-6">
                <div class="signup-box">

                    <h2>Create an Account</h2>
                    <p>It's free and always will be.</p>

                    <form>
                        <div class="row">
                            <div class="col">
                                <input type="text" class="form-control" placeholder="First name">
                            </div>
                            <div class="col">
                                <input type="text" class="form-control" placeholder="Last name">
                            </div>
                        </div>

                        <input type="text" id="firstName" class="form-control" placeholder="First name">
                        <input type="text" id="lastName" class="form-control" placeholder="Last name">
                        <input type="email" id="signupEmail" class="form-control" placeholder="Email">
                        <input type="password" id="signupPassword" class="form-control" placeholder="Password">

                        <!-- Gender -->
                        <div class="mt-2">
                            <input type="radio" name="gender"> Male
                            <input type="radio" name="gender" class="ms-3"> Female
                        </div>

                        <p class="mt-3" style="font-size:12px;">
                            By clicking create an account, you agree to our Terms.
                        </p>

                        <button class="btn btn-success w-50">Signup</button>

                    </form>

                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // SIGNUP FUNCTION
        document.querySelector(".signup-box form").addEventListener("submit", function (e) {
            e.preventDefault();

            const name = document.getElementById("firstName").value;
            const email = document.getElementById("signupEmail").value;
            const password = document.getElementById("signupPassword").value;

            // Store in localStorage
            const user = {
                name: name,
                email: email,
                password: password
            };

            localStorage.setItem("user", JSON.stringify(user));

            alert("Signup successful!");
        });


        // LOGIN FUNCTION
        document.querySelector(".top-bar form").addEventListener("submit", function (e) {
            e.preventDefault();

            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPassword").value;

            const storedUser = JSON.parse(localStorage.getItem("user"));

            if (storedUser && email === storedUser.email && password === storedUser.password) {
                alert("Welcome to Facebook, " + storedUser.name + "!");
            } else {
                alert("Invalid login!");
            }
        });
    </script>
</body>

</html>
