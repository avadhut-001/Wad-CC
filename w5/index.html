<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>E-commerce Page</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    .card-text {
      font-size: 14px;
    }
    .rating {
      color: gold;
    }
  </style>
</head>

<body>

<div class="container mt-4">

  <h2 class="text-center mb-4">Product Store</h2>

  <!-- Filter -->
  <div class="dropdown mb-4 text-center">
    <button class="btn btn-primary dropdown-toggle" data-bs-toggle="dropdown">
      Filter by Category
    </button>
    <ul class="dropdown-menu">
      <li><a class="dropdown-item" href="#" onclick="filterProducts('all')">All</a></li>
      <li><a class="dropdown-item" href="#" onclick="filterProducts('electronics')">Electronics</a></li>
      <li><a class="dropdown-item" href="#" onclick="filterProducts('clothing')">Clothing</a></li>
    </ul>
  </div>

  <!-- Products -->
  <div class="row">

    <!-- Product 1 -->
    <div class="col-sm-6 col-md-4 mb-4 product" data-category="electronics">
      <div class="card h-100">
        <img src="https://via.placeholder.com/300" class="card-img-top">
        <div class="card-body">
          <h5 class="card-title">Laptop</h5>
          <p class="card-text">High performance laptop for coding and gaming.</p>

          <!-- Rating -->
        

          <p class="fw-bold mt-2">₹50,000</p>
        </div>
      </div>
    </div>

    <!-- Product 2 -->
    <div class="col-sm-6 col-md-4 mb-4 product" data-category="clothing">
      <div class="card h-100">
        <img src="https://via.placeholder.com/300" class="card-img-top">
        <div class="card-body">
          <h5 class="card-title">T-Shirt</h5>
          <p class="card-text">Comfortable cotton t-shirt for daily wear.</p>

          

          <p class="fw-bold mt-2">₹500</p>
        </div>
      </div>
    </div>

    <!-- Product 3 -->
    <div class="col-sm-6 col-md-4 mb-4 product" data-category="electronics">
      <div class="card h-100">
        <img src="https://via.placeholder.com/300" class="card-img-top">
        <div class="card-body">
          <h5 class="card-title">Mobile</h5>
          <p class="card-text">Latest smartphone with great camera quality.</p>

          

          <p class="fw-bold mt-2">₹20,000</p>
        </div>
      </div>
    </div>

    <!-- Product 4 -->
    <div class="col-sm-6 col-md-4 mb-4 product" data-category="clothing">
      <div class="card h-100">
        <img src="https://via.placeholder.com/300" class="card-img-top">
        <div class="card-body">
          <h5 class="card-title">Jeans</h5>
          <p class="card-text">Stylish denim jeans with perfect fit.</p>

          

          <p class="fw-bold mt-2">₹1,200</p>
        </div>
      </div>
    </div>

  </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Filter Script -->
<script>
function filterProducts(category) {
  let products = document.querySelectorAll('.product');

  products.forEach(product => {
    if (category === 'all' || product.getAttribute('data-category') === category) {
      product.style.display = "block";
    } else {
      product.style.display = "none";
    }
  });
}
</script>

</body>
</html>
