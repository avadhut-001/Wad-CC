<!DOCTYPE html>
<html>

<head>
    <title>Login & Register</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        form {
            margin: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            display: inline-block;
        }

        input {
            display: block;
            margin: 10px;
            padding: 8px;
            width: 220px;
        }

        button {
            padding: 8px 15px;
        }
    </style>
</head>

<body>

    <h2>Register</h2>
    <form id="registerForm">
        <input type="text" id="name" placeholder="Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="text" id="mobile" placeholder="Mobile" required>
        <input type="date" id="dob" required>
        <input type="text" id="city" placeholder="City" required>
        <input type="text" id="address" placeholder="Address" required>
        <input type="password" id="regPassword" placeholder="Password" required>
        <button type="submit">Register</button>
    </form>

    <h2>Login</h2>
    <form id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email" required>
        <input type="password" id="loginPassword" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <script>
        let users = JSON.parse(localStorage.getItem("users")) || [];

        // 🔹 Simulated AJAX (no external API)
        function ajaxPost(data) {
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve({ status: "success", data: data });
                }, 500); // simulate delay
            });
        }

        // 🔹 Registration
        document.getElementById("registerForm").addEventListener("submit", function (e) {
            e.preventDefault();

            let user = {
                name: document.getElementById("name").value.trim(),
                email: document.getElementById("email").value.trim(),
                mobile: document.getElementById("mobile").value.trim(),
                dob: document.getElementById("dob").value,
                city: document.getElementById("city").value.trim(),
                address: document.getElementById("address").value.trim(),
                password: document.getElementById("regPassword").value
            };

            // ✅ Validations
            if (!/^[a-zA-Z ]+$/.test(user.name)) {
                alert("Name should contain only letters");
                return;
            }

            if (!/^\d{10}$/.test(user.mobile)) {
                alert("Mobile must be 10 digits");
                return;
            }

            if (user.password.length < 4) {
                alert("Password must be at least 4 characters");
                return;
            }

            if (users.some(u => u.email === user.email)) {
                alert("Email already registered");
                return;
            }

            // 🔹 AJAX simulation
            ajaxPost(user).then(res => {
                users.push(res.data);
                localStorage.setItem("users", JSON.stringify(users));
                alert("Registered Successfully!");
                registerForm.reset();
            });
        });

        // 🔹 Login
        document.getElementById("loginForm").addEventListener("submit", function (e) {
            e.preventDefault();

            let emailVal = loginEmail.value.trim();
            let passwordVal = loginPassword.value;

            let found = users.find(u => u.email === emailVal && u.password === passwordVal);

            if (found) {
                alert("Login Successful");
                window.location.href = "data.html";
            } else {
                alert("Invalid Email or Password");
            }
        });
    </script>

</body>

</html>
