<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Event Registration</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
    }
  </style>
</head>

<body>

<div class="container mt-5">
  <div class="card p-4 shadow">

    <h2 class="text-center mb-4">Event Registration Form</h2>

    <form class="needs-validation" novalidate>

      <!-- Name -->
      <div class="form-floating mb-3">
        <input type="text" class="form-control" id="name" placeholder="Name" required>
        <label for="name">Full Name</label>
        <div class="invalid-feedback">Please enter your name.</div>
      </div>

      <!-- Email -->
      <div class="form-floating mb-3">
        <input type="email" class="form-control" id="email" placeholder="Email" required>
        <label for="email">Email address</label>
        <div class="invalid-feedback">Enter a valid email.</div>
      </div>

      <!-- Phone -->
      <div class="form-floating mb-3">
        <input type="tel" class="form-control" id="phone" placeholder="Phone" required>
        <label for="phone">Phone Number</label>
        <div class="invalid-feedback">Enter your phone number.</div>
      </div>

      <!-- Event Selection -->
      <div class="mb-3">
        <label class="form-label">Select Event</label>
        <select class="form-select" required>
          <option value="">Choose...</option>
          <option>Workshop</option>
          <option>Seminar</option>
          <option>Hackathon</option>
        </select>
        <div class="invalid-feedback">Please select an event.</div>
      </div>

      <!-- Tooltip Example -->
      <div class="form-floating mb-3">
        <input type="text" class="form-control" id="college" placeholder="College"
               data-bs-toggle="tooltip" title="Enter your college name">
        <label for="college">College Name</label>
      </div>

      <!-- Checkbox -->
      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" required>
        <label class="form-check-label">I agree to terms and conditions</label>
        <div class="invalid-feedback">You must agree before submitting.</div>
      </div>

      <!-- Submit -->
      <button class="btn btn-primary w-100">Register</button>

    </form>

  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Validation Script -->
<script>
(() => {
  'use strict'
  const forms = document.querySelectorAll('.needs-validation')

  Array.from(forms).forEach(form => {
    form.addEventListener('submit', event => {
      if (!form.checkValidity()) {
        event.preventDefault()
        event.stopPropagation()
      }
      form.classList.add('was-validated')
    }, false)
  })
})()

// Enable tooltips
const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]')
tooltipTriggerList.forEach(el => new bootstrap.Tooltip(el))
</script>

</body>
</html>
