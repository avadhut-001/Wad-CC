<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>
    <div class="container mt-5">
        <div class="card p-4 shadow">

            <h2 class="text-center mb-4">Event Register form</h2>

            <form class="needs-validation" novalidate>
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="name" placeholder="Enter your name" required>
                    <label for="name">Full Name</label>
                    <div class="invalid-feedback">please enter your name</div>
                </div>


                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="email" placeholder="Enter Email" required>
                    <label for="email">Email</label>
                    <div class="invalid-feedback">Enter valid mail</div>
                </div>

                <div class="form-floating mb-3">
                    <input type="tel" class="form-control" placeholder="phone" id="phone" required>
                    <label for="phone">Mobile</label>
                    <div class="invalid-feedback">Enter correct Number</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Select Event</label>
                    <select class="form-select" required>
                        <option value="">choose....</option>
                        <option >Workshop</option>
                        <option >Seminar</option>
                        <option >Hackathon</option>
                    </select>

                    <div class="invalid-feedback">Please select an event.</div>
                </div>

                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="college" placeholder="Enter college Name" data-bs-toggle="tooltip" title="Enter College Name">
                    <label for="college" >College Name</label>
                </div>

                <div class="form-check mb-3" >
                    <input type="checkbox" class="form-check-input" required>
                    <label class="form-check-label">I agree to terms and conditions</label>
                    <div class="invalid-feedback">You must agree before submitting form</div>
                </div>

                <button class="btn btn-primary w-100">Register</button>
            </form>
        </div>


    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (()=>{
            'use strict'
            const forms = document.querySelectorAll('.needs-validation')

            Array.from(forms).forEach(form =>{
                form.addEventListener('submit', event=>{
                    if(!form.checkValidity()){
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>
</body>

</html>
