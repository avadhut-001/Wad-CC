<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>
    <div class="container mt-4">
        <div class="card p-4 shadow">

            <h2 class="text-center mb-4">Event Registraion Form </h2>

            <form class="needs-validation" novalidate>

                <div class="form-floating mb-3">
                    <input type="text" id="name" class="form-control" placeholder="Enter name" required>
                    <label for="name">Full Name</label>
                    <div class="invalid-feedback">Enter you name...</div>
                </div>

                <div class="form-floating mb-3">
                    <input type="email" id="email" class="form-control" placeholder="Enter email" required>
                    <label for="email">Full email</label>
                    <div class="invalid-tooltip">Enter you email...</div>
                </div>

                <div class="form-floating mb-3">
                    <input type="number" id="phone" class="form-control" placeholder="Enter name" required>
                    <label for="phone">Full number</label>
                    <div class="invalid-feedback">Enter you num...</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Select Event</label>
                    <select class="form-select" required>
                        <option value="">chooeee...</option>
                        <option>Workshop</option>
                        <option>Seminar</option>
                        <option>Hackathon</option>

                    </select>
                    <div class="invalid-feedback">Select event.</div>
                </div>

                <button type="submit" class="btn btn-primary w-100">Register</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
</body>

</html>
